<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UgTalk - AI Ugandan Translator{% endblock %}</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    {% block head %}{% endblock %}
</head>
<body>
    <!-- ============================================================
    NAVIGATION
    ============================================================ -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-language me-2"></i>
                <span class="fw-bold">UgTalk</span>
                <small class="ms-2 text-light-50 d-none d-sm-inline">AI Translator</small>
            </a>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                            <i class="fas fa-home me-1"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/translate' %}active{% endif %}" href="/translate">
                            <i class="fas fa-language me-1"></i> Translate
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/dashboard' %}active{% endif %}" href="/dashboard">
                            <i class="fas fa-chart-bar me-1"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/history' %}active{% endif %}" href="/history">
                            <i class="fas fa-clock-rotate me-1"></i> History
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/about' %}active{% endif %}" href="/about">
                            <i class="fas fa-info-circle me-1"></i> About
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ============================================================
    MAIN CONTENT
    ============================================================ -->
    <main class="container mt-4">
        {% block content %}{% endblock %}
    </main>

    <!-- ============================================================
    FOOTER
    ============================================================ -->
    <footer class="footer mt-5 py-4">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-4 text-center text-md-start">
                    <h6 class="mb-0 fw-bold">
                        <i class="fas fa-language me-2"></i>UgTalk
                    </h6>
                    <small class="text-light-50">AI-Powered Ugandan Language Translator</small>
                </div>
                
                <div class="col-md-4 text-center">
                    <small class="text-light-50">
                        <i class="fas fa-users me-1"></i> Group C &bull; 
                        <i class="fas fa-calendar me-1"></i> RECESS 2026
                    </small>
                </div>
                
                <div class="col-md-4 text-center text-md-end">
                    <a href="https://github.com/musamali-eng/UgTalk-Translator" target="_blank" class="text-light-50 me-2">
                        <i class="fab fa-github fa-lg"></i>
                    </a>
                    <a href="#" class="text-light-50 me-2">
                        <i class="fab fa-twitter fa-lg"></i>
                    </a>
                    <a href="#" class="text-light-50">
                        <i class="fab fa-linkedin fa-lg"></i>
                    </a>
                </div>
            </div>
            
            <hr class="my-3 border-light-10">
            
            <div class="text-center small text-light-50">
                <i class="fas fa-robot me-1"></i> Built with 
                <i class="fas fa-heart text-danger mx-1"></i> 
                Flask &amp; Machine Learning &bull; 
                <span id="year"></span>
            </div>
        </div>
    </footer>

    <!-- ============================================================
    SCRIPTS
    ============================================================ -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        // Auto-update footer year
        document.getElementById('year').textContent = new Date().getFullYear();
        
        // Add active class to current nav link
        document.addEventListener('DOMContentLoaded', function() {
            const currentPath = window.location.pathname;
            document.querySelectorAll('.nav-link').forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('active');
                }
            });
        });
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
